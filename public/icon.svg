<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="coinGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00E5FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#32D74B;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="#1E1E1E" stroke="#2C2C2E" stroke-width="8"/>

  <!-- Coin outer ring -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="url(#coinGradient)" stroke-width="16"/>

  <!-- Dollar sign / currency symbol -->
  <text x="256" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-size="200" font-weight="bold" fill="url(#coinGradient)">$</text>

  <!-- Chart line (upward trend) -->
  <polyline
    points="120,340 180,300 240,260 320,200 390,140"
    fill="none"
    stroke="#00E5FF"
    stroke-width="12"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- Chart dots -->
  <circle cx="120" cy="340" r="10" fill="#00E5FF"/>
  <circle cx="180" cy="300" r="10" fill="#00E5FF"/>
  <circle cx="240" cy="260" r="10" fill="#00E5FF"/>
  <circle cx="320" cy="200" r="10" fill="#32D74B"/>
  <circle cx="390" cy="140" r="14" fill="#32D74B"/>

  <!-- Up arrow at top -->
  <path d="M390 100 L390 140 M390 100 L370 120 M390 100 L410 120" stroke="#32D74B" stroke-width="10" stroke-linecap="round" fill="none"/>
</svg>